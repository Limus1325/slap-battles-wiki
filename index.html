<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slap Battles WIKI of Limus</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; color: #ff4757; }
        
        .gloves-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .glove-card {
            background: #2f3542;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        .glove-card:hover {
            transform: scale(1.05);
            border-color: #ff4757;
            background: #3a404d;
        }

        .glove-name {
            font-weight: bold;
            font-size: 1.1em;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #2f3542;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #ff4757;
        }

        .how-to-get {
            background: #1e272e;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            color: #7bed9f;
        }
        
        .update-status {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.8em;
            color: #a4b0be;
        }
    </style>
</head>
<body>

    <h1>🧤 Slap Battles Guides</h1>
    <div class="update-status">Версия: <span id="version">1.3</span> ✨</div>

    <div class="gloves-grid" id="grid"></div>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: #ff4757; margin-bottom: 10px;"></h2>
            <div class="how-to-get">
                <h3>🎯 Как получить:</h3>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ АДМИНКА: РЕДАКТИРУЙ ДАННЫЕ ЗДЕСЬ 🛠️
        // ==========================================
        
        const appVersion = "1.3";
        
        const glovesData = [
            {
                name: "Acrobat",
                description: "Выйди из игры, зайди в её профиль, выбери Community и в следующем окне нажми Join Community"
            },
            {
                name: "Push",
                description: "Найди кнопку в лобби или купи за 500 слапов."
            },
            {
                name: "God's Hand",
                description: "Сложный квест: найди 5 скрытых камней на карте."
            }
            // 📌 Чтобы добавить новую перчатку:
            // 1. Поставь запятую после предыдущей закрывающей скобки }
            // 2. Скопируй блок ниже и вставь сюда:
            /*
            , {
                name: "НАЗВАНИЕ",
                description: "Как получить"
            }
            */
        ];

        // ==========================================
        // 🔚 КОНЕЦ АДМИНКИ (ДАЛЬШЕ НЕ ТРОГАТЬ)
        // ==========================================

        const grid = document.getElementById('grid');
        const modal = document.getElementById('infoModal');
        
        document.getElementById('version').innerText = appVersion;

        function renderGloves() {
            grid.innerHTML = '';
            glovesData.forEach(glove => {
                const card = document.createElement('div');
                card.className = 'glove-card';
                card.onclick = () => openModal(glove);

                // ✅ Карточка только с текстом (без картинок!)
                card.innerHTML = `<div class="glove-name">${glove.name}</div>`;
                
                grid.appendChild(card);
            });
        }

        function openModal(glove) {
            document.getElementById('modalTitle').innerText = glove.name;
            document.getElementById('modalDesc').innerText = glove.description;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Запуск
        renderGloves();

        // Закрытие по клику вне окна
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        // Проверка в консоли
        console.log(`✅ Slap Battles Guide v${appVersion} loaded!`);
    </script>
</body>
</html>
